services:
  launchpad:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - launchpad_data:/data
      - launchpad_uploads:/uploads
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  launchpad_data:
  launchpad_uploads:
