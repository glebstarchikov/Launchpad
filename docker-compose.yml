services:
  launchpad:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - launchpad_data:/data
      - launchpad_uploads:/uploads
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:3001/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  launchpad_data:
  launchpad_uploads:
